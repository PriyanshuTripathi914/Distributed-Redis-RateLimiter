name: Java Distributed CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # GitHub automatically provisions an enterprise Redis instance here
    services:
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Codebase
      run: |
        javac -cp "lib/*" src/com/limiter/*.java

    - name: Execute Live Redis Connection Test
      run: |
        java -cp "src:lib/*" com.limiter.RateLimiterServer --ci